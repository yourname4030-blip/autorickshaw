<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Highway Racer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        canvas { 
            display: block; 
            position: fixed; 
            top: 0; 
            left: 0; 
        }
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            color: #0ff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
        }
        #controls {
            position: fixed;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 10;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(0,255,255,0.1);
            border: 3px solid #0ff;
            border-radius: 50%;
            color: #0ff;
            font-size: 35px;
            box-shadow: 0 0 20px #0ff, inset 0 0 20px rgba(0,255,255,0.2);
            backdrop-filter: blur(5px);
        }
        .btn:active {
            background: rgba(0,255,255,0.3);
            transform: scale(0.95);
        }
        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 2px solid #f0f;
            padding: 30px;
            text-align: center;
            color: #fff;
            border-radius: 15px;
            box-shadow: 0 0 30px #f0f;
            display: none;
            z-index: 20;
        }
        #gameOver h2 {
            color: #f0f;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #f0f;
        }
        #restart {
            margin-top: 20px;
            padding: 10px 30px;
            background: #f0f;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 25px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="score">Score: 0</div>
        <div id="speed">Speed: 0</div>
        <div id="high">High: 0</div>
    </div>
    <canvas id="game"></canvas>
    <div id="controls">
        <button class="btn" id="leftBtn">◄</button>
        <button class="btn" id="rightBtn">►</button>
    </div>
    <div id="gameOver">
        <h2>GAME OVER</h2>
        <p id="finalScore">Score: 0</p>
        <p id="finalHigh">High Score: 0</p>
        <button id="restart">RESTART</button>
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = {
    running: true,
    score: 0,
    speed: 5,
    highScore: localStorage.getItem('neonHighScore') || 0
};

const player = {
    x: canvas.width / 2 - 25,
    y: canvas.height - 120,
    w: 50,
    h: 90,
    speed: 8,
    color: '#ff0'
};

let enemies = [];
let particles = [];
let roadLines = [];
let keys = { left: false, right: false };

for(let i = 0; i < 20; i++) {
    roadLines.push({
        x: canvas.width / 2,
        y: i * 60,
        h: 30
    });
}

function drawRoad() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = '#f0f';
    ctx.lineWidth = 4;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#f0f';
    ctx.beginPath();
    ctx.moveTo(canvas.width * 0.2, 0);
    ctx.lineTo(canvas.width * 0.2, canvas.height);
    ctx.moveTo(canvas.width * 0.8, 0);
    ctx.lineTo(canvas.width * 0.8, canvas.height);
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#0ff';
    roadLines.forEach(line => {
        ctx.beginPath();
        ctx.moveTo(line.x, line.y);
        ctx.lineTo(line.x, line.y + line.h);
        ctx.stroke();
        line.y += gameState.speed;
        if(line.y > canvas.height) line.y = -60;
    });
    ctx.shadowBlur = 0;
}

function drawPlayer() {
    ctx.shadowBlur = 20;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    
    ctx.fillRect(player.x + 10, player.y, player.w - 20, player.h);
    ctx.fillRect(player.x, player.y + 15, player.w, player.h - 30);
    
    ctx.fillStyle = '#0ff';
    ctx.fillRect(player.x + 5, player.y + 10, 15, 20);
    ctx.fillRect(player.x + player.w - 20, player.y + 10, 15, 20);
    
    ctx.fillStyle = '#f00';
    ctx.fillRect(player.x + 8, player.y + player.h - 15, 10, 8);
    ctx.fillRect(player.x + player.w - 18, player.y + player.h - 15, 10, 8);
    ctx.shadowBlur = 0;
}

function spawnEnemy() {
    if(Math.random() < 0.03) {
        const lanes = [canvas.width * 0.25, canvas.width * 0.5, canvas.width * 0.75];
        enemies.push({
            x: lanes[Math.floor(Math.random() * 3)] - 25,
            y: -100,
            w: 50,
            h: 90,
            color: ['#f0f', '#0f0', '#f80'][Math.floor(Math.random() * 3)]
        });
    }
}

function drawEnemies() {
    enemies.forEach((enemy, i) => {
        enemy.y += gameState.speed + 2;
        
        ctx.shadowBlur = 20;
        ctx.shadowColor = enemy.color;
        ctx.fillStyle = enemy.color;
        ctx.fillRect(enemy.x + 10, enemy.y, enemy.w - 20, enemy.h);
        ctx.fillRect(enemy.x, enemy.y + 15, enemy.w, enemy.h - 30);
        ctx.shadowBlur = 0;
        
        if(enemy.y > canvas.height) {
            enemies.splice(i, 1);
            gameState.score += 10;
            if(gameState.score % 100 === 0) gameState.speed += 0.5;
        }
        
        if(checkCollision(player, enemy)) {
            gameOver();
        }
    });
}

function createParticles(x, y, color) {
    for(let i = 0; i < 15; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 30,
            color: color
        });
    }
}

function drawParticles() {
    particles.forEach((p, i) => {
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.fillRect(p.x, p.y, 4, 4);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if(p.life <= 0) particles.splice(i, 1);
    });
}

function checkCollision(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updatePlayer() {
    if(keys.left && player.x > canvas.width * 0.2) player.x -= player.speed;
    if(keys.right && player.x < canvas.width * 0.8 - player.w) player.x += player.speed;
    
    if(Math.random() < 0.3) {
        createParticles(player.x + player.w/2, player.y + player.h, '#ff0');
    }
}

function updateHUD() {
    document.getElementById('score').textContent = 'Score: ' + gameState.score;
    document.getElementById('speed').textContent = 'Speed: ' + Math.floor(gameState.speed * 10);
    document.getElementById('high').textContent = 'High: ' + gameState.highScore;
}

function gameOver() {
    gameState.running = false;
    createParticles(player.x + player.w/2, player.y + player.h/2, '#f00');
    
    if(gameState.score > gameState.highScore) {
        gameState.highScore = gameState.score;
        localStorage.setItem('neonHighScore', gameState.highScore);
    }
    
    document.getElementById('finalScore').textContent = 'Score: ' + gameState.score;
    document.getElementById('finalHigh').textContent = 'High Score: ' + gameState.highScore;
    document.getElementById('gameOver').style.display = 'block';
}

function restartGame() {
    gameState.running = true;
    gameState.score = 0;
    gameState.speed = 5;
    enemies = [];
    particles = [];
    player.x = canvas.width / 2 - 25;
    document.getElementById('gameOver').style.display = 'none';
}

function gameLoop() {
    if(!gameState.running) return;
    
    drawRoad();
    updatePlayer();
    drawPlayer();
    spawnEnemy();
    drawEnemies();
    drawParticles();
    updateHUD();
    
    requestAnimationFrame(gameLoop);
}

document.getElementById('leftBtn').addEventListener('touchstart', () => keys.left = true);
document.getElementById('leftBtn').addEventListener('touchend', () => keys.left = false);
document.getElementById('rightBtn').addEventListener('touchstart', () => keys.right = true);
document.getElementById('rightBtn').addEventListener('touchend', () => keys.right = false);
document.getElementById('restart').addEventListener('click', restartGame);

document.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft') keys.left = true;
    if(e.key === 'ArrowRight') keys.right = true;
});
document.addEventListener('keyup', e => {
    if(e.key === 'ArrowLeft') keys.left = false;
    if(e.key === 'ArrowRight') keys.right = false;
});

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

updateHUD();
gameLoop();
</script>
</body>
</html>
