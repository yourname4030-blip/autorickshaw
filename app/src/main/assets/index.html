<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Neon Highway Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; font-size: 24px; text-shadow: 0 0 10px #0ff; z-index: 10; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(0,255,255,0.1); border: 2px solid #0ff; border-radius: 50%; z-index: 10; }
        #stick { position: absolute; width: 50px; height: 50px; background: #0ff; border-radius: 50%; top: 35px; left: 35px; box-shadow: 0 0 20px #0ff; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span><br>SPEED: <span id="speed">0</span></div>
    <div id="joystick"><div id="stick"></div></div>
    <script type="module">
        import * as THREE from 'three';
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 50);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.DirectionalLight(0x00ffff, 1));
        scene.add(new THREE.AmbientLight(0x400040));
        const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);
        for(let i = 0; i < 20; i++) {
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 3), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            line.position.set(0, 0.1, i * 5 - 50);
            scene.add(line);
        }
        const car = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), new THREE.MeshStandardMaterial({color: 0xff00ff, emissive: 0xff00ff}));
        car.position.y = 0.25;
        scene.add(car);
        const enemies = [];
        for(let i = 0; i < 5; i++) {
            const enemy = car.clone();
            enemy.material = new THREE.MeshStandardMaterial({color: 0xff0000, emissive: 0xff0000});
            enemy.position.set((Math.random() - 0.5) * 8, 0.25, -50);
            scene.add(enemy);
            enemies.push(enemy);
        }
        let moveX = 0;
        const joystick = document.getElementById('joystick');
        const stick = document.getElementById('stick');
        joystick.addEventListener('touchmove', (e) => {
            const rect = joystick.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left - 60;
            moveX = Math.max(-1, Math.min(1, x / 40));
            stick.style.left = 35 + moveX * 30 + 'px';
        });
        joystick.addEventListener('touchend', () => { moveX = 0; stick.style.left = '35px'; });
        let score = 0, speed = 0.5;
        function animate() {
            requestAnimationFrame(animate);
            car.position.x += moveX * 0.2;
            car.position.x = Math.max(-4, Math.min(4, car.position.x));
            scene.children.forEach(child => {
                if(child.geometry?.type === 'BoxGeometry' && child.material.color.getHex() === 0x00ffff) {
                    child.position.z += speed;
                    if(child.position.z > 10) child.position.z = -50;
                }
            });
            enemies.forEach(enemy => {
                enemy.position.z += speed * 1.5;
                if(enemy.position.z > 10) {
                    enemy.position.z = -50;
                    enemy.position.x = (Math.random() - 0.5) * 8;
                    score += 10;
                }
                if(Math.abs(car.position.x - enemy.position.x) < 1 && Math.abs(car.position.z - enemy.position.z) < 2) {
                    score = 0;
                    enemy.position.z = -50;
                }
            });
            camera.position.x = car.position.x * 0.5;
            camera.lookAt(car.position.x, 0, car.position.z - 5);
            document.getElementById('score').textContent = score;
            document.getElementById('speed').textContent = Math.floor(speed * 100);
            speed += 0.0001;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
