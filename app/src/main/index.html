<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #score { position: fixed; top: 20px; left: 20px; color: #0ff; font-family: Arial; font-size: 24px; text-shadow: 0 0 10px #0ff; }
        #controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .btn { width: 70px; height: 70px; background: rgba(0,255,255,0.2); border: 2px solid #0ff; border-radius: 50%; color: #0ff; font-size: 30px; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="game"></canvas>
    <div id="controls">
        <button class="btn" id="left">◄</button>
        <button class="btn" id="right">►</button>
    </div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let car = { x: canvas.width/2, y: canvas.height-100, w: 50, h: 80 };
let obstacles = [];
let score = 0;
let keys = {};
document.getElementById('left').ontouchstart = () => keys.ArrowLeft = true;
document.getElementById('left').ontouchend = () => keys.ArrowLeft = false;
document.getElementById('right').ontouchstart = () => keys.ArrowRight = true;
document.getElementById('right').ontouchend = () => keys.ArrowRight = false;
function drawCar() {
    ctx.fillStyle = '#ff0';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ff0';
    ctx.fillRect(car.x, car.y, car.w, car.h);
}
function update() {
    if (keys.ArrowLeft && car.x > 0) car.x -= 8;
    if (keys.ArrowRight && car.x < canvas.width-car.w) car.x += 8;
    if (Math.random() < 0.02) obstacles.push({ x: Math.random()*(canvas.width-40), y: -50, w: 40, h: 40 });
    obstacles.forEach((obs, i) => {
        obs.y += 5;
        if (obs.y > canvas.height) { obstacles.splice(i,1); score++; }
        if (car.x < obs.x+obs.w && car.x+car.w > obs.x && car.y < obs.y+obs.h && car.y+car.h > obs.y) {
            alert('Game Over! Score: ' + score);
            obstacles = []; score = 0;
        }
    });
    document.getElementById('score').innerText = 'Score: ' + score;
}
function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#0ff';
    for(let i=0; i<canvas.height; i+=50) {
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, i);
        ctx.lineTo(canvas.width/2, i+25);
        ctx.stroke();
    }
    drawCar();
    obstacles.forEach(obs => {
        ctx.fillStyle = '#f0f';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#f0f';
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    });
}
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
